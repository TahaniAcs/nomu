{% extends "base.html" %}
{% block title %}إنشاء طلب حصاد جديد{% endblock %}
{% block content %}
<div class="page-container">
    <div class="dashboard-layout">
        <div class="dashboard-content">
            <div class="form-card">
                <div style="text-align:center;margin-bottom:24px">
                    <h1 style="font-size:1.6rem;font-weight:800;color:var(--green-dark)">إنشاء طلب حصاد جديد</h1>
                    <p style="color:var(--text-light)">املأ التفاصيل أدناه للعثور على متطوعين لحصادك.</p>
                </div>
                <form method="POST" enctype="multipart/form-data">
                    <div class="form-group">
                        <label>المحصول</label>
                        <input type="text" name="crop" class="form-control" placeholder="مثال: زيتون" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>عدد المتطوعين المطلوبين</label>
                            <input type="number" name="volunteers_needed" class="form-control" value="1" min="1" required>
                        </div>
                        <div class="form-group">
                            <label>تاريخ الحصاد</label>
                            <input type="date" name="harvest_date" class="form-control" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>الموقع</label>
                        <input type="text" name="location" class="form-control" placeholder="مثال: عسير، حي المنسك" required>
                    </div>
                    <div class="form-group">
                        <div style="display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none" onclick="toggleReward()">
                            <span id="rewardSlider" style="position:relative;display:inline-block;width:46px;height:24px;background:#ccc;border-radius:24px;transition:background .2s;flex-shrink:0">
                                <span id="rewardKnob" style="position:absolute;top:2px;right:2px;width:20px;height:20px;background:#fff;border-radius:50%;transition:right .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)"></span>
                            </span>
                            <span>أرغب بإضافة مكافأة (اختياري)</span>
                        </div>
                        <div id="rewardWrap" style="display:none;margin-top:10px">
                            <input type="text" name="reward" class="form-control" placeholder="مثال: صندوق من المنتجات الطازجة، وجبة غداء منزلية">
                        </div>
                    </div>
                    <script>
                        let rewardOn = false;
                        function toggleReward(){
                            rewardOn = !rewardOn;
                            document.getElementById('rewardSlider').style.background = rewardOn ? 'var(--green-btn)' : '#ccc';
                            document.getElementById('rewardKnob').style.right = rewardOn ? '24px' : '2px';
                            document.getElementById('rewardWrap').style.display = rewardOn ? 'block' : 'none';
                            if(!rewardOn) document.querySelector('[name=reward]').value = '';
                        }
                    </script>
                    <div class="form-group">
                        <label>صورة المحصول (اختياري)</label>
                        <input type="file" name="image" class="form-control" accept="image/png,image/jpeg,image/jpg,image/webp" style="padding:10px">
                    </div>
                    <div class="form-group">
                        <label>وصف إضافي (اختياري)</label>
                        <textarea name="description" class="form-control" rows="4"></textarea>
                    </div>
                    <div style="text-align:center">
                        <button type="submit" class="btn btn-primary btn-lg">نشر الطلب</button>
                    </div>
                </form>
            </div>
        </div>
        <div class="sidebar">
            <ul class="sidebar-nav">
                <li><a href="{{ url_for('farmer_dashboard') }}"><span class="icon">🏠</span> نظرة عامة</a></li>
                <li><a href="{{ url_for('farmer_requests') }}"><span class="icon">👥</span> طلباتي</a></li>
                <li><a href="{{ url_for('farmer_new_request') }}" class="active"><span class="icon">➕</span> طلب جديد</a></li>
                <li><a href="{{ url_for('farmer_predict') }}"><span class="icon">🤖</span> تقدير الحصاد</a></li>
            <li><a href="{{ url_for('farmer_settings') }}"><span class="icon">⚙️</span> الإعدادات</a></li>
            </ul>
        </div>
    </div>
</div>
{% endblock %}
